name: customer-support-openenv
description: RL-based customer support environment with multi-step reasoning

entrypoint: api.server:app

tasks:
  - id: easy
    description: Password reset request
    difficulty: easy

  - id: medium
    description: Refund request
    difficulty: medium

  - id: hard
    description: Multi-issue customer complaint
    difficulty: hard

grader:
  type: episode
  score_range: [0.0, 1.0]
